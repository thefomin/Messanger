openapi: 3.0.0
info:
  title: Messanger API
  description: API for collaborative messaging + auth service (Redis sessions)
  version: 1.0.0

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: sid

paths:
  /auth/register:
    post:
      $ref: "./endpoints/auth.yaml#/register"

  /auth/login:
    post:
      $ref: "./endpoints/auth.yaml#/login"

  /auth/logout:
    post:
      $ref: "./endpoints/auth.yaml#/logout"
